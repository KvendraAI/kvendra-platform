# SPDX-License-Identifier: AGPL-3.0-only
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: kvendra
          POSTGRES_PASSWORD: kvendra
          POSTGRES_DB: kvendra_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kvendra -d kvendra_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://kvendra:kvendra@localhost:5432/kvendra_platform
      EMBEDDINGS_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t kvendra-platform:ci .
